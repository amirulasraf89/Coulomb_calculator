<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Two Point Charges — Coulomb Calculator</title>
  <style>
    :root { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; color: #111; }
    body { margin: 0; padding: 24px; background: #f6f8fb; }
    h1 { margin: 0 0 12px 0; font-size: 20px; }
    .card { background: white; border-radius: 10px; padding: 18px; box-shadow: 0 6px 18px rgba(14,30,37,0.08); max-width: 820px; margin: 0 auto; }
    .row { display:flex; gap:12px; align-items: center; flex-wrap:wrap; margin-bottom:10px; }
    label { font-size: 13px; color:#333; display:block; margin-bottom:6px; }
    input[type="number"], input[type="text"] { padding:8px 10px; border-radius:6px; border:1px solid #d6dbe6; min-width:120px; }
    .coords { display:flex; gap:8px; }
    button { background:#0066ff; color:white; border:none; padding:10px 14px; border-radius:8px; cursor:pointer; font-weight:600; }
    button.secondary { background:#eaeefb; color:#0b3a97; }
    .results { margin-top:12px; background:#fbfdff; border-radius:8px; padding:12px; border:1px solid #e6eefb; }
    code { background:#f3f6fb; padding:2px 6px; border-radius:4px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .small { font-size:13px; color:#555; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
    @media (max-width:600px){ .grid{grid-template-columns:1fr} .coords{flex-direction:column} }
  </style>
</head>
<body>
  <div class="card">
    <h1>Two point charges — Coulomb calculator</h1>
    <div class="small">Enter charges (C) and coordinates (m). We'll compute the force <em>on q1 due to q2</em>, and on q2 (equal & opposite).</div>

    <div style="height:8px;"></div>

    <div class="grid">
      <div>
        <label><strong>Charge q₁</strong> (C)</label>
        <input id="q1" type="number" step="any" value="1e-6" />
        <div style="height:8px;"></div>
        <label>Coordinates of q₁ (m)</label>
        <div class="coords">
          <div>
            <input id="x1" type="number" step="any" placeholder="x1" value="0" />
            <div class="small">x₁</div>
          </div>
          <div>
            <input id="y1" type="number" step="any" placeholder="y1" value="0" />
            <div class="small">y₁</div>
          </div>
          <div>
            <input id="z1" type="number" step="any" placeholder="z1" value="0" />
            <div class="small">z₁</div>
          </div>
        </div>
      </div>

      <div>
        <label><strong>Charge q₂</strong> (C)</label>
        <input id="q2" type="number" step="any" value="-2e-6" />
        <div style="height:8px;"></div>
        <label>Coordinates of q₂ (m)</label>
        <div class="coords">
          <div>
            <input id="x2" type="number" step="any" placeholder="x2" value="0.5" />
            <div class="small">x₂</div>
          </div>
          <div>
            <input id="y2" type="number" step="any" placeholder="y2" value="0" />
            <div class="small">y₂</div>
          </div>
          <div>
            <input id="z2" type="number" step="any" placeholder="z2" value="0" />
            <div class="small">z₂</div>
          </div>
        </div>
      </div>
    </div>

    <div style="height:10px;"></div>

    <div class="row">
      <button id="calc">Calculate</button>
      <button id="clear" class="secondary">Reset example values</button>
      <div style="flex:1"></div>
      <label style="margin:0 6px 0 0;">k (Coulomb constant)</label>
      <input id="kconst" type="text" value="8.9875517923e9" style="min-width:160px" />
    </div>

    <div id="output" class="results" aria-live="polite">
      <div class="small">Results will appear here after you click <code>Calculate</code>.</div>
    </div>

  </div>

  <script>
    // Coulomb constant default (N·m²/C²)
    const DEFAULT_K = 8.9875517923e9;

    function fmt(x, sig=6) {
      if (!isFinite(x)) return String(x);
      // show as scientific if very large or very small, else fixed
      const abs = Math.abs(x);
      if ((abs !== 0 && (abs < 1e-3 || abs >= 1e5))) {
        return x.toExponential(sig-1);
      } else {
        return Number(x.toFixed(Math.max(0, sig - Math.floor(Math.log10(abs||1)) - 1)));
      }
    }

    function calculate() {
      const q1 = parseFloat(document.getElementById('q1').value) || 0;
      const q2 = parseFloat(document.getElementById('q2').value) || 0;
      const x1 = parseFloat(document.getElementById('x1').value) || 0;
      const y1 = parseFloat(document.getElementById('y1').value) || 0;
      const z1 = parseFloat(document.getElementById('z1').value) || 0;
      const x2 = parseFloat(document.getElementById('x2').value) || 0;
      const y2 = parseFloat(document.getElementById('y2').value) || 0;
      const z2 = parseFloat(document.getElementById('z2').value) || 0;
      const k = Number(document.getElementById('kconst').value) || DEFAULT_K;

      const output = document.getElementById('output');

      // displacement vector from q1 to q2: r_vec = r2 - r1
      const rx = x2 - x1;
      const ry = y2 - y1;
      const rz = z2 - z1;

      const rmag = Math.hypot(rx, ry, rz);

      if (rmag === 0) {
        output.innerHTML = `
          <div style="color:#8a0b0b; font-weight:700">Error — identical positions</div>
          <div class="small">The two charges are at the same coordinates. The Coulomb force is undefined (infinite). Move one charge or add a small separation.</div>
        `;
        return;
      }

      // unit vector from q1 to q2
      const ux = rx / rmag;
      const uy = ry / rmag;
      const uz = rz / rmag;

      // magnitude of force on q1 due to q2: F = k * q1 * q2 / r^2
      const Fmag = k * q1 * q2 / (rmag * rmag);

      // Note: Fmag may be negative if q1*q2 negative. The sign indicates direction relative to r_hat.
      // We'll compute vector: F_vec = Fmag * r_hat
      const Fx = Fmag * ux;
      const Fy = Fmag * uy;
      const Fz = Fmag * uz;

      // Force on q2 due to q1 is equal & opposite
      const Fx_on_q2 = -Fx;
      const Fy_on_q2 = -Fy;
      const Fz_on_q2 = -Fz;

      // Electric potential energy U = k * q1 * q2 / r
      const U = k * q1 * q2 / rmag;

      // Build result HTML
      output.innerHTML = `
        <div style="font-weight:700; margin-bottom:6px">Computed values</div>

        <div><strong>Distance r</strong>: ${fmt(rmag)} m</div>
        <div><strong>Displacement vector r (q1 → q2)</strong>: [${fmt(rx)}, ${fmt(ry)}, ${fmt(rz)}] m</div>
        <div><strong>Unit vector r̂ (q1 → q2)</strong>: [${fmt(ux,8)}, ${fmt(uy,8)}, ${fmt(uz,8)}]</div>

        <hr style="margin:8px 0">

        <div><strong>Force on q₁ due to q₂ (vector)</strong>: [${fmt(Fx)}, ${fmt(Fy)}, ${fmt(Fz)}] N</div>
        <div class="small">Interpretation: positive component => force points in +axis direction. Negative => force points in -axis direction.</div>
        <div style="height:6px;"></div>
        <div><strong>Magnitude |F|</strong>: ${fmt(Math.abs(Fmag))} N</div>
        <div class="small">Sign of F (q₁·q₂): ${q1 * q2 >= 0 ? 'positive → repulsive' : 'negative → attractive' } (F computed uses sign: F = k·q₁·q₂ / r²).</div>

        <hr style="margin:8px 0">

        <div><strong>Force on q₂ due to q₁ (vector)</strong>: [${fmt(Fx_on_q2)}, ${fmt(Fy_on_q2)}, ${fmt(Fz_on_q2)}] N</div>

        <hr style="margin:8px 0">

        <div><strong>Electric potential energy U</strong>: ${fmt(U)} J</div>

        <div style="margin-top:10px" class="small">
          Formulae used:
          <ul>
            <li>Coulomb's law: F = k·q₁·q₂ / r² (vector: F = (k·q₁·q₂ / r²) · r̂)</li>
            <li>Potential energy: U = k·q₁·q₂ / r</li>
            <li>k is Coulomb constant (N·m²/C²). Default: ${DEFAULT_K}</li>
          </ul>
        </div>
      `;
    }

    document.getElementById('calc').addEventListener('click', (e)=> {
      e.preventDefault();
      calculate();
    });

    document.getElementById('clear').addEventListener('click', (e)=>{
      e.preventDefault();
      // example defaults
      document.getElementById('q1').value = "1e-6";
      document.getElementById('q2').value = "-2e-6";
      document.getElementById('x1').value = "0";
      document.getElementById('y1').value = "0";
      document.getElementById('z1').value = "0";
      document.getElementById('x2').value = "0.5";
      document.getElementById('y2').value = "0";
      document.getElementById('z2').value = "0";
      document.getElementById('kconst').value = DEFAULT_K;
      document.getElementById('output').innerHTML = `<div class="small">Example values restored. Click <code>Calculate</code>.</div>`;
    });

    // run calculation once on load with the sample values
    window.addEventListener('load', () => calculate());
  </script>
</body>
</html>
